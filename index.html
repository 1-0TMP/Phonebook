<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Prevents iPhone Safari double-tap zoom on the dial pad -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Hospital Phonebook</title>

  <style>
    html, body, button {
      touch-action: manipulation;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    h2 {
      margin-top: 0;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button {
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
    }

    button {
      background: #0b66c3;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #555;
    }

    button.danger {
      background: #b00020;
    }

    button.small {
      font-size: 14px;
      padding: 8px;
      margin-top: 6px;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .button-row button {
      flex: 1;
    }

    .number-display {
      font-size: 28px;
      text-align: center;
      font-weight: bold;
      margin: 12px 0;
      word-break: break-word;
    }

    .directory-item {
      border-top: 1px solid #eee;
      padding: 12px 0;
    }

    .label {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .note {
      font-size: 14px;
      color: #666;
      line-height: 1.4;
    }

    .match-name {
      font-size: 16px;
      text-align: center;
      color: #555;
      margin-top: 6px;
    }

    .contact-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .contact-info {
      flex: 1;
      line-height: 1.35;
    }

    .menu-button {
      width: 44px;
      min-width: 44px;
      height: 44px;
      padding: 0;
      margin-top: 0;
      border-radius: 50%;
      background: #555;
      font-size: 24px;
      line-height: 1;
    }

    .contact-menu {
      margin-top: 10px;
    }

    .phone-link {
      color: #0b66c3;
      font-weight: bold;
      text-decoration: none;
    }

    .phone-link:active {
      opacity: 0.7;
    }

    .dialer-display {
      font-size: 42px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 8px;
      background: #f2f2f2;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .dial-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .dial-pad button {
      font-size: 28px;
      height: 70px;
      margin-top: 0;
    }

    .call-button {
      background: #0a7f28;
      font-size: 24px;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <h1>Hospital Phonebook</h1>
  <div class="subtitle">5-digit extension dialer and searchable phone book</div>

  <div class="card">
    <div class="button-row">
      <button onclick="showDialer()">Dial Extension</button>
      <button class="secondary" onclick="showPhoneBook()">Search Phone Book</button>
    </div>
  </div>

  <div id="dialerCard" class="card">
    <h2>Dial Extension</h2>

    <div id="dialerDisplay" class="dialer-display">_____</div>

    <div class="dial-pad">
      <button onclick="addDigit('1')">1</button>
      <button onclick="addDigit('2')">2</button>
      <button onclick="addDigit('3')">3</button>

      <button onclick="addDigit('4')">4</button>
      <button onclick="addDigit('5')">5</button>
      <button onclick="addDigit('6')">6</button>

      <button onclick="addDigit('7')">7</button>
      <button onclick="addDigit('8')">8</button>
      <button onclick="addDigit('9')">9</button>

      <button class="secondary" onclick="clearDialer()">Clear</button>
      <button onclick="addDigit('0')">0</button>
      <button class="secondary" onclick="deleteLastDigit()">⌫</button>
    </div>

    <button class="call-button" onclick="callDialedExtension()">Call</button>

    <div id="resultBox" class="hidden">
      <div id="matchedName" class="match-name"></div>
      <div class="label">Dialing</div>
      <div id="fullNumberDisplay" class="number-display"></div>
    </div>

    <p class="note">
      Enter exactly 5 digits. Press Call to dial directly.
    </p>
  </div>

  <div id="phoneBookCard" class="card hidden">
    <h2>Phone Book</h2>

    <h2>Add / Edit Entry</h2>

    <label class="label">Name or unit</label>
    <input id="entryName" placeholder="e.g. SICU Charge" />

    <label class="label">5-digit extension</label>
    <input id="entryExtension" maxlength="5" inputmode="numeric" placeholder="e.g. 65186" />

    <label class="label">Full number, optional</label>
    <input id="entryNumber" placeholder="e.g. +13129265186" />

    <button onclick="saveDirectoryEntry()">Save Directory Entry</button>

    <hr />

    <h2>Search Directory</h2>

    <input
      id="searchInput"
      placeholder="Search OR, SICU, CT, nursing station..."
      oninput="renderDirectory()"
    />

    <div id="directoryList"></div>
  </div>

    function getCorrections() {
      return JSON.parse(localStorage.getItem(CORRECTIONS_STORAGE_KEY) || "{}");
    }

    function setCorrections(corrections) {
      localStorage.setItem(CORRECTIONS_STORAGE_KEY, JSON.stringify(corrections));
    }

    function getDirectory() {
      const saved = localStorage.getItem(DIRECTORY_STORAGE_KEY);

      if (saved) {
        return JSON.parse(saved);
      }

      localStorage.setItem(DIRECTORY_STORAGE_KEY, JSON.stringify(startingDirectory));
      return startingDirectory;
    }

    function setDirectory(directory) {
      localStorage.setItem(DIRECTORY_STORAGE_KEY, JSON.stringify(directory));
    }

    function cleanPhoneNumber(number) {
      return String(number).replace(/[^0-9+]/g, "");
    }

    function isValidExtension(extension) {
      return /^\d{5}$/.test(extension);
    }

    /*
      This is the important routing logic from the reference app.

      6xxxx -> +131292xxxxx
      2xxxx -> +131247xxxxx
      everything else -> +131269xxxxx
    */
    function makePhone(extension) {
      if (extension.charAt(0) === "6") {
        return "+131292" + extension;
      }

      if (extension.charAt(0) === "2") {
        return "+131247" + extension;
      }

      return "+131269" + extension;
    }

    function formatDefaultNumber(extension) {
      return makePhone(extension);
    }

    function findDirectoryMatches(extension) {
      const directory = getDirectory();

      return directory.filter(function(item) {
        return item.extension === extension;
      });
    }

    function getFullNumber(extension) {
      const corrections = getCorrections();

      if (corrections[extension]) {
        return corrections[extension];
      }

      const matches = findDirectoryMatches(extension);

      if (matches.length > 0 && matches[0].fullNumber) {
        return matches[0].fullNumber;
      }

      return formatDefaultNumber(extension);
    }

    function updateDialerDisplay() {
      const display = document.getElementById("dialerDisplay");
      const padded = dialedExtension.padEnd(5, "_");
      display.textContent = padded;
    }

    function addDigit(digit) {
      if (dialedExtension.length >= 5) {
        return;
      }

      dialedExtension += digit;
      updateDialerDisplay();
    }

    function deleteLastDigit() {
      dialedExtension = dialedExtension.slice(0, -1);
      updateDialerDisplay();
    }

    function clearDialer() {
      dialedExtension = "";
      currentExtension = "";
      currentNumber = "";

      updateDialerDisplay();

      document.getElementById("resultBox").classList.add("hidden");
    }

    function callDialedExtension() {
      if (!isValidExtension(dialedExtension)) {
        alert("Please enter exactly 5 digits.");
        return;
      }

      currentExtension = dialedExtension;
      currentNumber = getFullNumber(dialedExtension);

      const matches = findDirectoryMatches(dialedExtension);
      const matchedNameDiv = document.getElementById("matchedName");

      if (matches.length > 0) {
        matchedNameDiv.textContent = matches.map(function(item) {
          return item.name;
        }).join(" / ");
      } else {
        matchedNameDiv.textContent = "No phone book match found";
      }

      document.getElementById("fullNumberDisplay").textContent = currentNumber;
      document.getElementById("resultBox").classList.remove("hidden");

      callNumber(cleanPhoneNumber(currentNumber));
    }

    function callNumber(number) {
      if (!number) {
        alert("No number available to call.");
        return;
      }

      window.location.href = "tel:" + number;
    }

    function saveDirectoryEntry() {
      const name = document.getElementById("entryName").value.trim();
      const extension = document.getElementById("entryExtension").value.trim();
      const fullNumber = document.getElementById("entryNumber").value.trim();

      if (!name) {
        alert("Please enter a name or unit.");
        return;
      }

      if (!isValidExtension(extension)) {
        alert("Please enter a valid 5-digit extension.");
        return;
      }

      const directory = getDirectory();

      const existingIndex = directory.findIndex(function(item) {
        return item.extension === extension && item.name === name;
      });

      const entry = {
        name: name,
        extension: extension,
        fullNumber: fullNumber
      };

      if (existingIndex >= 0) {
        directory[existingIndex] = entry;
      } else {
        directory.push(entry);
      }

      setDirectory(directory);

      document.getElementById("entryName").value = "";
      document.getElementById("entryExtension").value = "";
      document.getElementById("entryNumber").value = "";

      renderDirectory();

      alert("Directory entry saved.");
    }

    function saveCorrectionForExtension(extension, correctedNumber) {
      const corrections = getCorrections();
      corrections[extension] = correctedNumber;
      setCorrections(corrections);
      renderDirectory();
    }

    function editWrongNumber(extension) {
      const currentFullNumber = getFullNumber(extension);
      const correctedNumber = prompt("Enter the correct full number:", currentFullNumber);

      if (!correctedNumber) {
        return;
      }

      saveCorrectionForExtension(extension, correctedNumber.trim());
      alert("Correction saved on this device.");
    }

    function deleteDirectoryEntry(index) {
      const confirmDelete = confirm("Delete this directory entry?");

      if (!confirmDelete) {
        return;
      }

      const directory = getDirectory();
      directory.splice(index, 1);
      setDirectory(directory);
      renderDirectory();
    }

    function loadEntryForEdit(index) {
      const directory = getDirectory();
      const item = directory[index];

      if (!item) {
        return;
      }

      document.getElementById("entryName").value = item.name;
      document.getElementById("entryExtension").value = item.extension;
      document.getElementById("entryNumber").value = item.fullNumber || "";

      document.getElementById("entryName").scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }

    function toggleContactMenu(index) {
      const menu = document.getElementById("menu-" + index);

      if (!menu) {
        return;
      }

      menu.classList.toggle("hidden");
    }

    function renderDirectory() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const directory = getDirectory();
      const corrections = getCorrections();

      const list = document.getElementById("directoryList");
      list.innerHTML = "";

      let foundCount = 0;

      directory.forEach(function(item, index) {
        const searchableText = (
          item.name + " " +
          item.extension + " " +
          (item.fullNumber || "")
        ).toLowerCase();

        if (!searchableText.includes(search)) {
          return;
        }

        foundCount++;

        const finalNumber =
          corrections[item.extension] ||
          item.fullNumber ||
          formatDefaultNumber(item.extension);

        const cleanNumber = cleanPhoneNumber(finalNumber);

        const div = document.createElement("div");
        div.className = "directory-item";

        div.innerHTML =
          "<div class='contact-header'>" +
            "<div class='contact-info'>" +
              "<strong>" + item.name + "</strong><br>" +
              "Extension: " + item.extension + "<br>" +
              "Dial: <a class='phone-link' href='tel:" + cleanNumber + "'>" + finalNumber + "</a>" +
            "</div>" +
            "<button class='menu-button' onclick='toggleContactMenu(" + index + ")'>⋮</button>" +
          "</div>" +

          "<div id='menu-" + index + "' class='contact-menu hidden'>" +
            "<button class='small' onclick='callNumber(\"" + cleanNumber + "\")'>Call</button>" +
            "<button class='small secondary' onclick='editWrongNumber(\"" + item.extension + "\")'>Edit if Wrong</button>" +
            "<button class='small secondary' onclick='loadEntryForEdit(" + index + ")'>Edit Entry</button>" +
            "<button class='small danger' onclick='deleteDirectoryEntry(" + index + ")'>Delete</button>" +
          "</div>";

        list.appendChild(div);
      });

      if (foundCount === 0) {
        list.innerHTML = "<p class='note'>No matching phone book entries.</p>";
      }
    }

    function showDialer() {
      document.getElementById("dialerCard").classList.remove("hidden");
      document.getElementById("phoneBookCard").classList.add("hidden");
    }

    function showPhoneBook() {
      document.getElementById("phoneBookCard").classList.remove("hidden");
      document.getElementById("dialerCard").classList.add("hidden");
      renderDirectory();
    }

    updateDialerDisplay();
    renderDirectory();
  </script>
</body>
</html>

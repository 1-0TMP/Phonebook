<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Hospital Phonebook</title>

  <style>
    html, body, button {
      touch-action: manipulation;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    h2 {
      margin-top: 0;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button {
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
    }

    button {
      background: #0b66c3;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #555;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .button-row button {
      flex: 1;
    }

    .hidden {
      display: none;
    }

    .note {
      font-size: 14px;
      color: #666;
      line-height: 1.4;
    }

    .match-name {
      font-size: 16px;
      text-align: center;
      color: #555;
      margin-top: 6px;
    }

    .number-display {
      font-size: 28px;
      text-align: center;
      font-weight: bold;
      margin: 12px 0;
      word-break: break-word;
    }

    .dialer-display {
      font-size: 42px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 8px;
      background: #f2f2f2;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .dial-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .dial-pad button {
      font-size: 28px;
      height: 70px;
      margin-top: 0;
    }

    .call-button {
      background: #0a7f28;
      font-size: 24px;
      margin-top: 14px;
    }

    .directory-item {
      border-top: 1px solid #eee;
      padding: 12px 0;
      line-height: 1.35;
    }

    .phone-link {
      color: #0b66c3;
      font-weight: bold;
      text-decoration: none;
    }

    .phone-link:active {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <h1>Hospital Phonebook</h1>
  <div class="subtitle">5-digit extension dialer and searchable phone book</div>

  <div class="card">
    <div class="button-row">
      <button onclick="showDialer()">Dial Extension</button>
      <button class="secondary" onclick="showPhoneBook()">Search Phone Book</button>
    </div>
  </div>

  <div id="dialerCard" class="card">
    <h2>Dial Extension</h2>

    <div id="dialerDisplay" class="dialer-display">_____</div>

    <div class="dial-pad">
      <button onclick="addDigit('1')">1</button>
      <button onclick="addDigit('2')">2</button>
      <button onclick="addDigit('3')">3</button>

      <button onclick="addDigit('4')">4</button>
      <button onclick="addDigit('5')">5</button>
      <button onclick="addDigit('6')">6</button>

      <button onclick="addDigit('7')">7</button>
      <button onclick="addDigit('8')">8</button>
      <button onclick="addDigit('9')">9</button>

      <button class="secondary" onclick="clearDialer()">Clear</button>
      <button onclick="addDigit('0')">0</button>
      <button class="secondary" onclick="deleteLastDigit()">⌫</button>
    </div>

    <button class="call-button" onclick="callDialedExtension()">Call</button>

    <div id="resultBox" class="hidden">
      <div id="matchedName" class="match-name"></div>
      <div class="number-display" id="fullNumberDisplay"></div>
    </div>

    <p class="note">Enter exactly 5 digits. Press Call to dial directly.</p>
  </div>

  <div id="phoneBookCard" class="card hidden">
    <h2>Phone Book</h2>

    <input
      id="searchInput"
      placeholder="Search OR, SICU, CT, nursing station..."
      oninput="renderDirectory()"
    />

    <div id="directoryList"></div>
  </div>

    function isValidExtension(extension) {
      return /^\d{5}$/.test(extension);
    }

    function cleanPhoneNumber(number) {
      return String(number).replace(/[^0-9+]/g, "");
    }

    function makePhone(extension) {
      if (extension.charAt(0) === "6") {
        return "+131292" + extension;
      }

      if (extension.charAt(0) === "2") {
        return "+131247" + extension;
      }

      return "+131269" + extension;
    }

    function findDirectoryMatches(extension) {
      return directory.filter(function(item) {
        return item.extension === extension;
      });
    }

    function updateDialerDisplay() {
      const display = document.getElementById("dialerDisplay");
      display.textContent = dialedExtension.padEnd(5, "_");
    }

    function addDigit(digit) {
      if (dialedExtension.length >= 5) {
        return;
      }

      dialedExtension += digit;
      updateDialerDisplay();
    }

    function deleteLastDigit() {
      dialedExtension = dialedExtension.slice(0, -1);
      updateDialerDisplay();
    }

    function clearDialer() {
      dialedExtension = "";
      currentNumber = "";
      updateDialerDisplay();
      document.getElementById("resultBox").classList.add("hidden");
    }

    function callDialedExtension() {
      if (!isValidExtension(dialedExtension)) {
        alert("Please enter exactly 5 digits.");
        return;
      }

      const matches = findDirectoryMatches(dialedExtension);
      currentNumber = makePhone(dialedExtension);

      if (matches.length > 0) {
        document.getElementById("matchedName").textContent = matches.map(function(item) {
          return item.name;
        }).join(" / ");
      } else {
        document.getElementById("matchedName").textContent = "No phone book match found";
      }

      document.getElementById("fullNumberDisplay").textContent = currentNumber;
      document.getElementById("resultBox").classList.remove("hidden");

      callNumber(currentNumber);
    }

    function callNumber(number) {
      const cleaned = cleanPhoneNumber(number);

      if (!cleaned) {
        alert("No number available to call.");
        return;
      }

      window.location.href = "tel:" + cleaned;
    }

    function renderDirectory() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const list = document.getElementById("directoryList");

      list.innerHTML = "";

      const filtered = directory.filter(function(item) {
        return (
          item.name.toLowerCase().includes(search) ||
          item.extension.includes(search)
        );
      });

      if (filtered.length === 0) {
        list.innerHTML = "<p class='note'>No matching phone book entries.</p>";
        return;
      }

      filtered.forEach(function(item) {
        const fullNumber = makePhone(item.extension);
        const cleanNumber = cleanPhoneNumber(fullNumber);

        const div = document.createElement("div");
        div.className = "directory-item";

        div.innerHTML =
          "<strong>" + item.name + "</strong><br>" +
          "Extension: " + item.extension + "<br>" +
          "Dial: <a class='phone-link' href='tel:" + cleanNumber + "'>" + fullNumber + "</a>";

        list.appendChild(div);
      });
    }

    function showDialer() {
      document.getElementById("dialerCard").classList.remove("hidden");
      document.getElementById("phoneBookCard").classList.add("hidden");
    }

    function showPhoneBook() {
      document.getElementById("phoneBookCard").classList.remove("hidden");
      document.getElementById("dialerCard").classList.add("hidden");
      renderDirectory();
    }

    updateDialerDisplay();
    renderDirectory();
  </script>

</html>
